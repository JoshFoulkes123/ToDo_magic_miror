<hmtl>
    <head>
        <link rel="stylesheet" href="style.css">
        
        <title>Todo list, all tasks page</title>
    </head>
    <body>
        <h1>All Tasks</h1>
        <hr>
        <div>
            <button id="Dashboard_link" onclick="location.href='index.html'">Dashboard</button>
            <button id="New_task_link" onclick="location.href='task_add.html'">New Task</button>
            <button id="Settings_link" onclick="location.href='settings.html'">Settings</button>
        </div>
        <hr>
        <br>
        <label for="task_filter">Filter: </label>

            <option value="Date">Date</option>
            <option value="Urgency">Urgency</option>

        </select>
        
        <div id="task_display_all">

                <h3>Clean Fridge</h3>
                <p>Last Completed: <date>22/02/26</date> <p>
                <p>Repeats: every 4 week<p>
                <p>Urgency: Low<p>
                <button class="detailed_link" onclick="location.href=''">See Details</button>
                <button class="Settings_link" onclick="location.href=''">Complete</button>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
    
</hmtl>

<hmtl>
    <head>
        <link rel="stylesheet" href="{{ url_for('static', filename='style_mirror.css') }}">
        
        <title>Todo list, mirror dashboard</title>
    </head>
    <body>
        <h1><a id="page_title" href="{{ url_for('index') }}">Mirror Dashboard</a></h1>
        


        <div id="main_body">    


            <div id = "task_display">

                <div id="clock_display">
                </div>

                <div id ="late_task_dashboard" class="task_items">
                    <hr>
                    <h2>Late Tasks</h2>
                        <br>
                </div>


                
                <div id="today_task_dashboard" class = "task_items">
                    <hr>
                    <h2>Today's tasks</h2>
                        <br>
                    
                </div>
                


                <div id="upcoming_task_dashboard" class = "task_items">
                    <hr>
                    <h2>Upcoming tasks</h2>
                        <br>
                </div>

            </div>

            <br>

            <div id="middle_spacer"></div>

            <div id="weather_display">
                <div id="sat_weather">
                    <p id="sat_weather_date">Sat 7 March</p>
                    <p id="sat_weather_desc">Cloudy  1%</p>
                    <img id="sat_weather_img" src="http://openweathermap.org/img/wn/03d@2x.png" style="border-radius: 50%;" alt="Weather img" />
                    <p id="sat_weather_temp">20C / 2C</p>
                    <p id="sat_weather_Sunset">Sunset: 21:23</p>
                </div>
                <br>
                <div id ="sun_weather">
                    <p id="sun_weather_date">Sun 8 March</p>
                    <p id="sun_weather_desc">Cloudy  1%</p>
                    <img id="sat_weather_img" src="http://openweathermap.org/img/wn/03d@2x.png" style="border-radius: 50%;" alt="Weather img" />
                    <p id="sun_weather_temp">20C / 2C</p>
                    <p id="sun_weather_Sunset">Sunset: 21:23</p>
                </div>
            </div>
        </div>
        <script src="{{ url_for('static', filename='mirror_script.js') }}"></script>
    </body>
    
</hmtl>
